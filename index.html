    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>

        --focus-color: hsla(212, 100%, 48%, 1);
      }
      
      body {
        margin: 0;
        background-color: var(--vercel-white);
        color: var(--vercel-black);
        line-height: 1.5;
